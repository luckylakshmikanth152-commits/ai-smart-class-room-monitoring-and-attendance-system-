{% extends 'attendance/base.html' %}
{% block fullpage %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background: linear-gradient(135deg, #1e293b, #3b82f6);">
    <div class="card shadow-lg" style="width: 400px; border-radius: 16px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="bi bi-mortarboard-fill" style="font-size: 3rem; color: #3b82f6;"></i>
                <h3 class="mt-2">Smart Classroom</h3>
                <p class="text-muted">AI-Powered Attendance System</p>
            </div>
            {% if messages %}
                {% for m in messages %}
                    <div class="alert alert-danger">{{ m }}</div>
                {% endfor %}
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
            <p class="text-muted text-center mt-3 small">
                Avanthi Institute of Engineering and Technology
            </p>
        </div>
    </div>
</div>
{% endblock %}
